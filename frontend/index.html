<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --border: #1e1e2e;
            --neon-cyan: #00fff0;
            --neon-magenta: #ff00aa;
            --text: #c9d1d9;
            --text-muted: #6e7681;
            --danger: #ff3e3e;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                linear-gradient(0deg, transparent 95%, rgba(0,255,240,0.015) 95%),
                linear-gradient(90deg, transparent 95%, rgba(0,255,240,0.015) 95%);
            background-size: 20px 20px;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; border-bottom: 1px solid var(--border);
            margin-bottom: 2rem; background-color: rgba(10,10,15,0.9);
            backdrop-filter: blur(5px); position: sticky; top: 0; z-index: 20;
        }
        .navbar-brand {
            font-family: 'Orbitron', sans-serif; color: var(--neon-cyan);
            font-size: 1.5rem; text-decoration: none;
            text-shadow: 0 0 4px rgba(0,255,240,0.2);
        }
        .hero { text-align: center; padding: 3rem 1rem; margin-bottom: 2rem; }
        .hero h1 {
            font-family: 'Orbitron', sans-serif; font-size: 3rem;
            color: var(--neon-cyan); margin-bottom: 0.5rem;
            text-shadow: 0 0 6px rgba(0,255,240,0.25); letter-spacing: 2px;
        }
        .hero p { font-family: 'Fira Code', monospace; font-size: 1rem; color: var(--text-muted); }
        .btn-neon-outline {
            background-color: transparent; border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 0.5rem 1.2rem; border-radius: 4px;
            cursor: pointer; font-family: 'Fira Code', monospace; font-size: 0.9rem;
            transition: all 0.2s ease; text-decoration: none; display: inline-block;
            text-align: center; text-transform: uppercase;
        }
        .btn-neon-outline:hover {
            background-color: rgba(0,255,240,0.05);
            box-shadow: 0 0 8px rgba(0,255,240,0.2);
        }
        #app { flex-grow: 1; padding: 0 2rem 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        button { border: none; cursor: pointer; font-family: 'Fira Code', monospace; font-size: 0.9rem; transition: all 0.2s ease; }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">[ SW_HUB ]</a>
        <button id="login-btn" class="btn-neon-outline">[ LOGIN ]</button>
    </nav>
    <header class="hero">
        <h1>SOFTWARE HUB</h1>
        <p>// ACCESS THE ARSENAL</p>
    </header>
    <div id="app"></div>
    <script type="module" src="/src/app.js"></script>
</body>
</html>
