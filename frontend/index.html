<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubly</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;700;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#99f7ff",
            "primary-container": "#00f1fe",
            "primary-dim": "#00e2ee",
            "surface": "#0e0e0e",
            "surface-dim": "#0e0e0e",
            "surface-container": "#1a1a1a",
            "surface-container-low": "#131313",
            "surface-container-high": "#20201f",
            "surface-container-highest": "#262626",
            "surface-container-lowest": "#000000",
            "on-background": "#ffffff",
            "on-surface": "#ffffff",
            "on-surface-variant": "#adaaaa",
            "on-primary": "#005f64",
            "on-primary-container": "#00555a",
            "outline-variant": "#484847",
            "outline": "#767575",
            "error": "#ff716c",
            "error-dim": "#d7383b",
            "secondary": "#929bfa",
            "tertiary": "#ac89ff",
            "tertiary-dim": "#874cff"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          }
        }
      }
    }
  </script>

  <style>
    .glass-card {
      background: rgba(26, 26, 26, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .animate-pulse-dot { animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body custom-scrollbar">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 bg-neutral-950/70 backdrop-blur-xl border-b border-white/5 shadow-[0_4px_20px_-5px_rgba(153,247,255,0.1)]">
    <div class="max-w-[860px] mx-auto px-6 h-16 flex items-center justify-end">
      <button id="login-btn" class="bg-primary/10 text-cyan-400 px-4 py-2 rounded-xl text-sm font-bold border border-primary/20 hover:bg-primary/20 transition-all">
        [ LOGIN ]
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="pt-24 md:pt-32 pb-12 px-6 max-w-[860px] mx-auto">
    <h1 id="hero-headline" class="font-headline font-black text-4xl md:text-8xl tracking-[-0.04em] uppercase leading-none mb-6 cursor-default select-none">
      Hubly
    </h1>
    <p class="font-body text-on-surface-variant max-w-2xl text-base md:text-lg font-light leading-relaxed">
      Access high-frequency software artifacts stored within our pressurized repository. Precision-engineered tools for technical operators and system architects.
    </p>
  </header>

  <!-- Main Content -->
  <main id="app" class="max-w-[860px] pb-40 px-6 mx-auto">
    <!-- Rendered by JavaScript -->
  </main>

  <!-- Footer -->
  <footer class="bg-neutral-950 border-t border-neutral-900 py-3 px-8 fixed bottom-0 left-0 right-0 z-40">
    <div class="max-w-[860px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="font-body text-[10px] uppercase tracking-[0.2em] text-neutral-600">
        © 2025 Hubly. ALL RIGHTS RESERVED. &nbsp;|&nbsp; DEVELOPED BY OI
      </div>
    </div>
  </footer>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
